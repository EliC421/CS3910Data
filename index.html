<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iowa Data Visualization</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    

    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app">
        <header class="topbar">
            <div class="topbar-left">
                <h1>Iowa Data Visualization Project</h1>
                <p>Visualize Correlations in Iowa Data</p>
            </div>
        </header>

        <main class="dashboard">
            <!-- Tabs row -->
            <section class="tabs-panel">
                <div class="tab-list">
                    <button class="tab-button active" type="button" data-tab="dui-crashes">DUIs &amp; Crashes</button>
                    <button class="tab-button" type="button" data-tab="offenders-alerts">Sex Offenders &amp; Amber Alerts</button>
                    <button class="tab-button" type="button" data-tab="literacy-pbs">Literacy &amp; PBS Services</button>
                </div>
            </section>

            <!-- Main content row -->
            <section class="main-layout">
                <section class="map-section">
                    <div class="card-header">
                        <h2 id="map-title">Liquor sales, DUI charges, and crashes</h2>
                    </div>
            
                    <div class="map-shell">
                        <div id="map"></div>
                    
                        <div id="county-card" class="county-card hidden">
                            <h3 id="county-card-title">County Name</h3>
                            <p id="county-card-body">County details will appear here.</p>
                        </div>
                    </div>
                </section>
            
                <aside class="layers-panel">
                    <div class="card-header">
                        <h2>Layers</h2>
                    </div>
                    <div id="layer-controls" class="layer-controls"></div>
                </aside>
            </section>

            <section class="graphs-card">
                <div class="card-header">
                    <h2>Graphs Potentially</h2>
                </div>
                <div id="charts-container" class="charts-placeholder">
                    Graphs will appear here if we still want it
                </div>
            </section>
        </main>
    </div>

    <script src="config.js"></script>
    <script src="js/map.js"></script>
    <script src="js/data-processor.js"></script>
    <script src="js/main.js"></script>

    <script>
        const googleMapsScript = document.createElement('script');
        googleMapsScript.src = `https://maps.googleapis.com/maps/api/js?key=${CONFIG.googleMapsApiKey}&callback=initMap`;
        googleMapsScript.async = true;
        googleMapsScript.defer = true;
        document.head.appendChild(googleMapsScript);
    </script>
</body>
</html>
